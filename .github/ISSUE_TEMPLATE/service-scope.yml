name: Service scope request
description: Request a fixed-scope productized service.
title: "Ready to pay: Service scope - "
labels: ["paid-inquiry", "ready-to-pay", "service-order", "needs-scope"]
body:
  - type: markdown
    attributes:
      value: |
        Fastest $100 Start: https://jaxassistant55.github.io/jax-micro-offer-studio/fastest-100-start.html
        Fastest route CSV: https://jaxassistant55.github.io/jax-micro-offer-studio/fastest_100_start.csv
        Paid offer action catalog: https://jaxassistant55.github.io/jax-micro-offer-studio/paid-offer-action-catalog.html
        Catalog release/assets: https://github.com/jaxassistant55/jax-micro-offer-studio/releases/tag/paid-offer-action-catalog-v1
        Payment activation after scope acceptance: https://jaxassistant55.github.io/jax-micro-offer-studio/payment-activation
        One-sale payment packets after accepted scope: https://jaxassistant55.github.io/jax-micro-offer-studio/one-sale-payment-packets.html
        Exact $100 fast-start route: https://jaxassistant55.github.io/jax-micro-offer-studio/first-100-fast-start.html
        Use a packet only after a real buyer selects a route and accepts scope or transfer terms. Paste only a seller-owned checkout, invoice, marketplace order, funded milestone, or payment request URL.
        Use this for one of the fixed-scope services. Do not paste secrets, payment details, tax identifiers, or files you are not authorized to share.
        Observed preview-download close rooms:
        - Local SEO GBP Audit Starter ($175): https://jaxassistant55.github.io/jax-micro-offer-studio/hot-download-close-local-seo-gbp-audit-starter.html
        - PDF Table Extraction Starter ($125): https://jaxassistant55.github.io/jax-micro-offer-studio/hot-download-close-pdf-table-extraction-starter.html
  - type: dropdown
    id: service
    attributes:
      label: Service
      options:
        - First $100 Fast Start - choose one mini scope ($100)
        - Website Audit Microservice ($150)
        - Data Cleanup Sprint ($125)
        - AI Workflow Tracker Sprint ($150)
        - Static Demo Site Customization ($200)
        - Niche Quote Estimator ($150)
        - Automation Blueprint ($100)
        - Local SEO / GBP Audit ($175)
        - Technical Docs Cleanup ($150)
        - Client Intake and SOP Package ($125)
        - PDF/Table Extraction ($125)
        - Content Repurposing Sprint ($100)
        - Resume / LinkedIn / Interview Pack ($125)
        - Resale Listing and Price Research Pack ($100)
        - Translation and Localization Draft Pack ($100)
        - Subscription Audit and Savings Prep Pack ($100)
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Exact scope
      description: What public URL, authorized file, workflow, or output should be handled?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance proof
      description: What will show the work is accepted and payable?
    validations:
      required: true
  - type: input
    id: payment
    attributes:
      label: Payment route
      placeholder: "invoice, funded milestone, platform order, or other external proof route"
    validations:
      required: true
