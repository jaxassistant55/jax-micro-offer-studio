name: First $100 Product Bundle Order
description: Public intake board for the $100 product bundle transfer.
title: "[Order] $100 Bundle Transfer - [Your Name/Context]"
labels: ["order", "bundle-100", "public-intake"]
body:
  - type: markdown
    attributes:
      value: |
        ## First $100 Product Bundle Order Board
        
        This is the public intake board for the **$100 transfer** of the prepared product ZIP bundle.
        
        > **⚠️ Important**: The paid files are **not** attached here. This issue is strictly for public-safe scope and delivery preference.
        
        **Bundle Scope:**
        - One $100 transfer of the prepared product ZIP bundle.
        - Includes the local paid product ZIP inventory listed on the public bundle page and delivery manifest.

  - type: checkboxes
    id: scope-confirmation
    attributes:
      label: Scope Confirmation
      description: Please confirm you understand the scope of this order.
      options:
        - label: I understand this order is for the public-safe scope and delivery preference only.
          required: true
        - label: I understand the paid files are not attached to this issue and will be delivered via the agreed method.
          required: true

  - type: textarea
    id: license-context
    attributes:
      label: Requested License/Usage Context
      description: Please describe how you intend to use the product bundle (e.g., personal use, commercial project, internal tool, etc.).
      placeholder: "e.g., I plan to use the assets for a commercial SaaS dashboard..."
    validations:
      required: true

  - type: dropdown
    id: delivery-preference
    attributes:
      label: Delivery Preference
      description: How would you like to receive the bundle after external verification?
      options:
        - GitHub Release (Public/Private)
        - Secure Cloud Link (Google Drive/Dropbox)
        - Email Attachment (if file size permits)
        - Other (Specify in comments)
    validations:
      required: true

  - type: textarea
    id: additional-notes
    attributes:
      label: Additional Notes
      description: Any specific requirements or questions regarding the delivery?
      placeholder: "Optional details..."
    validations:
      required: false