name: First $100 Fast Start
description: Ready-to-pay intake for one exact $100 fixed-scope starter.
title: "Ready to pay: First $100 Fast Start - "
labels: ["paid-inquiry", "ready-to-pay", "first-100"]
body:
  - type: markdown
    attributes:
      value: |
        Fastest $100 Start:
        - Page: https://jaxassistant55.github.io/jax-micro-offer-studio/fastest-100-start.html
        - Route CSV: https://jaxassistant55.github.io/jax-micro-offer-studio/fastest_100_start.csv
        - Payment packets after accepted scope: https://jaxassistant55.github.io/jax-micro-offer-studio/one-sale-payment-packets.html
        - Payment activation after accepted scope: https://jaxassistant55.github.io/jax-micro-offer-studio/payment-activation
        - Proof monitor: https://jaxassistant55.github.io/jax-micro-offer-studio/proof-monitor.html

        Use this path when the buyer wants the shortest fixed-scope route to a $100 paid order. This issue is intake only; money counts only after accepted scope, seller-owned external payment proof, delivery proof, and posted/released/payable/cleared funds exist.
  - type: markdown
    attributes:
      value: |
        Start here for one exact $100 fixed-scope starter:
        https://jaxassistant55.github.io/jax-micro-offer-studio/first-100-fast-start.html

        Terms and acceptance:
        https://jaxassistant55.github.io/jax-micro-offer-studio/first-100-fast-start-terms.html

        Order board:
        https://github.com/jaxassistant55/jax-micro-offer-studio/issues/24

        Payment activation after scope acceptance:
        https://jaxassistant55.github.io/jax-micro-offer-studio/payment-activation.html

        Matching one-sale payment packet after exact acceptance:
        https://jaxassistant55.github.io/jax-micro-offer-studio/one-sale-payment-packets.html#central-first-100-fast-start

        Use the packet only after the $100 starter scope is selected and accepted. Paste only a seller-owned checkout, invoice, marketplace order, funded milestone, or payment request URL.

        This GitHub issue is intake only. Paid work starts only after scope is accepted and external payment proof exists through a seller-owned checkout, invoice, marketplace order, funded milestone, or payment request.
  - type: dropdown
    id: starter_scope
    attributes:
      label: Starter scope
      description: Pick one exact $100 starter.
      options:
        - Automation Blueprint Mini ($100)
        - PDF/Table Extraction Mini ($100)
        - Local SEO Snapshot Mini ($100)
        - Website Quick-Win Audit Mini ($100)
    validations:
      required: true
  - type: textarea
    id: exact_acceptance_statement
    attributes:
      label: Exact acceptance statement
      description: Paste this exact sentence without edits. If you need different terms, say so before payment instead of changing this text.
      placeholder: "I accept the First $100 Fast Start fixed-scope terms at $100. I understand work starts only after seller-owned external payment proof exists; I will provide only public or buyer-authorized non-sensitive inputs; the selected starter scope is limited to the deliverable described on the First $100 Fast Start page; and custom implementation, account login work, credential handling, regulated advice, paid ads, purchasing, ongoing support, or extra revisions are not included unless separately agreed before payment."
    validations:
      required: true
  - type: textarea
    id: authorized_input
    attributes:
      label: Public or buyer-authorized input
      description: Provide a public URL or describe the buyer-authorized input. Do not paste secrets or confidential files into this public issue.
      placeholder: "Public URL, public business/profile, workflow summary, or buyer-authorized non-sensitive input summary."
    validations:
      required: true
  - type: input
    id: deadline
    attributes:
      label: Deadline
      description: When do you need the starter delivered?
      placeholder: "YYYY-MM-DD or relative deadline"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criterion
      description: What will show that the fixed-scope starter is accepted?
      placeholder: "Example: delivered CSV opens cleanly; audit covers the listed URL; blueprint includes current flow, risks, and next actions."
    validations:
      required: true
  - type: input
    id: payment_route
    attributes:
      label: External payment or proof route
      description: Use a seller-owned checkout, invoice, marketplace order, funded milestone, payment request, or equivalent external proof route.
      placeholder: "invoice, checkout, funded milestone, marketplace order, or payment request"
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I will not post passwords, payment cards, tax identifiers, credentials, private client files, or confidential documents in this public issue.
          required: true
        - label: I have reviewed the First $100 Fast Start Terms and pasted the exact acceptance statement above before requesting a payment route.
          required: true
        - label: I understand this issue is not payment proof and money counts only after external payment is posted, released, payable, or cleared.
          required: true
