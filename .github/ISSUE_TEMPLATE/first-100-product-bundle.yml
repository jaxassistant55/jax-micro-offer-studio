name: First $100 Product Bundle ready-to-buy
description: Public-safe intake for the $100 private product-bundle transfer.
title: "Ready to buy: First $100 Product Bundle - "
labels: ["paid-inquiry", "ready-to-pay", "product-transfer", "first-100"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for a legitimate $100 First $100 Product Bundle purchase inquiry.

        Bundle page:
        https://jaxassistant55.github.io/jax-micro-offer-studio/first-100-product-bundle.html

        Marketplace listing packet:
        https://jaxassistant55.github.io/jax-micro-offer-studio/first-100-product-bundle-marketplace.html

        Public release packet:
        https://github.com/jaxassistant55/jax-micro-offer-studio/releases/tag/first-100-product-bundle-marketplace-v1

        Payment activation after terms are accepted:
        https://jaxassistant55.github.io/jax-micro-offer-studio/payment-activation

        This GitHub issue is intake only. The private paid ZIP is delivered only after accepted product-transfer terms and external payment proof through a seller-owned checkout, invoice, marketplace order, funded milestone, or payment request.
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Confirm the product transfer being requested.
      options:
        - First $100 Product Bundle ($100 private transfer)
    validations:
      required: true
  - type: dropdown
    id: usage_context
    attributes:
      label: Usage context
      description: Choose the closest true usage context.
      options:
        - Internal business or team use
        - Personal project use
        - Client project use with no resale or redistribution
        - Need to clarify usage before payment
    validations:
      required: true
  - type: textarea
    id: delivery_preference
    attributes:
      label: Delivery preference
      description: Describe the private delivery channel you want used after external payment proof exists. Do not post private email addresses if you do not want them public.
      placeholder: "Private delivery channel after payment proof exists."
    validations:
      required: true
  - type: textarea
    id: acceptance_proof
    attributes:
      label: Acceptance proof
      description: What will show the transfer is accepted after private delivery?
      placeholder: "Example: platform delivery marked complete, buyer reply confirming receipt, or order/milestone acceptance."
    validations:
      required: true
  - type: input
    id: payment_route
    attributes:
      label: External payment or proof route
      description: Use a seller-owned checkout, invoice, marketplace order, funded milestone, payment request, or equivalent external proof route.
      placeholder: "invoice, checkout, funded milestone, marketplace order, or payment request"
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Product-transfer terms
      options:
        - label: I understand this is a $100 private product-bundle transfer, not custom implementation work.
          required: true
        - label: I understand the private paid ZIP is not attached publicly and is delivered only after external payment proof exists.
          required: true
        - label: I will not request resale, redistribution, sublicensing, credential handling, regulated advice, or unsupported income/outcome guarantees.
          required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I will not post passwords, payment cards, tax identifiers, credentials, private regulated information, confidential files, payment screenshots, or private delivery links in this public issue.
          required: true
        - label: I understand this issue is not payment proof and money counts only after external payment is posted, released, payable, or cleared.
          required: true
