<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice and Expense Tracker</title>
  <style>
    :root { --ink:#172033; --muted:#5f6878; --line:#d8deea; --panel:#f7f9fc; --ok:#17643a; --bad:#a33a2a; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:#fff; font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.45; }
    main { width:min(1080px, calc(100% - 32px)); margin:0 auto; padding:28px 0 44px; }
    header { border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:22px; }
    h1 { margin:0 0 8px; font-size:clamp(1.8rem,3vw,2.5rem); letter-spacing:0; }
    h2 { margin:24px 0 10px; font-size:1.05rem; letter-spacing:0; }
    p { margin:0 0 10px; }
    .muted { color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin:18px 0; }
    .metric { border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:12px; min-height:90px; }
    .metric span { display:block; color:var(--muted); font-size:.76rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .metric strong { display:block; margin-top:7px; font-size:1.35rem; }
    table { width:100%; border-collapse:collapse; border:1px solid var(--line); }
    th, td { padding:9px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; font-size:.9rem; overflow-wrap:anywhere; }
    th { color:var(--muted); background:var(--panel); font-size:.74rem; text-transform:uppercase; letter-spacing:.04em; }
    .ok { color:var(--ok); font-weight:700; }
    .bad { color:var(--bad); font-weight:700; }
    @media (max-width:760px) {
      .grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
      table, thead, tbody, tr, th, td { display:block; }
      thead { display:none; }
      tr { border-bottom:1px solid var(--line); padding:8px 0; }
      td { border-bottom:0; padding:6px 9px; }
      td::before { content:attr(data-label); display:block; color:var(--muted); font-size:.72rem; font-weight:700; text-transform:uppercase; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Invoice and Expense Tracker</h1>
      <p class="muted">Sample dashboard for a digital download or $100 setup service. Not tax advice.</p>
    </header>
    <section class="grid" aria-label="Finance metrics">
      <div class="metric"><span>Income</span><strong id="income">$0</strong></div>
      <div class="metric"><span>Expenses</span><strong id="expenses">$0</strong></div>
      <div class="metric"><span>Net</span><strong id="net">$0</strong></div>
      <div class="metric"><span>Outstanding</span><strong id="outstanding">$0</strong></div>
    </section>
    <section>
      <h2>Sample Rows</h2>
      <table>
        <thead><tr><th>Date</th><th>Type</th><th>Name</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
  <script>
    const rows = [
      {date:"2026-06-01", type:"income", name:"Acme Studio", amount:150, status:"sent"},
      {date:"2026-06-02", type:"expense", name:"Hosting Provider", amount:12, status:"paid"},
      {date:"2026-06-04", type:"income", name:"Beta Research", amount:125, status:"paid"},
      {date:"2026-06-05", type:"expense", name:"Marketplace", amount:8.75, status:"paid"},
      {date:"2026-06-08", type:"income", name:"Local Tutor", amount:150, status:"draft"}
    ];
    const income = rows.filter(r => r.type === "income").reduce((sum, r) => sum + r.amount, 0);
    const expenses = rows.filter(r => r.type === "expense").reduce((sum, r) => sum + r.amount, 0);
    const outstanding = rows.filter(r => r.type === "income" && r.status !== "paid").reduce((sum, r) => sum + r.amount, 0);
    document.querySelector("#income").textContent = "$" + income.toFixed(2);
    document.querySelector("#expenses").textContent = "$" + expenses.toFixed(2);
    document.querySelector("#net").textContent = "$" + (income - expenses).toFixed(2);
    document.querySelector("#outstanding").textContent = "$" + outstanding.toFixed(2);
    document.querySelector("#rows").innerHTML = rows.map(row => `
      <tr>
        <td data-label="Date">${row.date}</td>
        <td data-label="Type">${row.type}</td>
        <td data-label="Name">${row.name}</td>
        <td data-label="Amount" class="${row.type === "income" ? "ok" : "bad"}">$${row.amount.toFixed(2)}</td>
        <td data-label="Status">${row.status}</td>
      </tr>
    `).join("");
  </script>
</body>
</html>
