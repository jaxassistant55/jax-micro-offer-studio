<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Printable Weekly Planner</title><style>body{font-family:Arial,sans-serif;margin:24px;color:#111}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{border:1px solid #555;min-height:180px;padding:8px}h1{letter-spacing:0}@media print{button{display:none}.day{break-inside:avoid}}</style></head><body><button onclick="print()">Print</button><h1>Weekly Planner</h1><p>Focus, appointments, top three tasks, and notes.</p><div class="week"><section class="day"><strong>Mon</strong><p>Focus:</p><p>1.</p><p>2.</p><p>3.</p><p>Notes:</p></section><section class="day"><strong>Tue</strong><p>Focus:</p><p>1.</p><p>2.</p><p>3.</p><p>Notes:</p></section><section class="day"><strong>Wed</strong><p>Focus:</p><p>1.</p><p>2.</p><p>3.</p><p>Notes:</p></section><section class="day"><strong>Thu</strong><p>Focus:</p><p>1.</p><p>2.</p><p>3.</p><p>Notes:</p></section><section class="day"><strong>Fri</strong><p>Focus:</p><p>1.</p><p>2.</p><p>3.</p><p>Notes:</p></section><section class="day"><strong>Sat</strong><p>Focus:</p><p>1.</p><p>2.</p><p>3.</p><p>Notes:</p></section><section class="day"><strong>Sun</strong><p>Focus:</p><p>1.</p><p>2.</p><p>3.</p><p>Notes:</p></section></div></body></html>
