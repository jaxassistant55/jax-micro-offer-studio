<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orb Courier</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #101820; color: #f8fbff; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { width: min(920px, calc(100% - 24px)); }
    h1 { margin: 0 0 8px; font-size: clamp(1.8rem, 4vw, 3rem); letter-spacing: 0; }
    .hud { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
    .pill { border: 1px solid #37506b; border-radius: 999px; padding: 6px 10px; background: #182638; }
    canvas { width: 100%; aspect-ratio: 16 / 9; display: block; border: 1px solid #37506b; border-radius: 8px; background: #0d1420; }
    button { border: 0; border-radius: 8px; padding: 9px 12px; font-weight: 700; background: #ffd166; color: #1b1f24; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>Orb Courier</h1>
    <p>Collect blue parcels, avoid amber drones, and deliver to the green dock. Arrow keys or WASD move.</p>
    <div class="hud"><span class="pill">Score: <strong id="score">0</strong></span><span class="pill">Time: <strong id="time">45</strong></span><button id="restart">Restart</button></div>
    <canvas id="game" width="960" height="540" aria-label="Orb Courier game canvas"></canvas>
  </main>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const keys = new Set();
    let player, parcels, drones, score, timeLeft, last, over;

    function reset() {
      player = { x: 90, y: 270, r: 16, hasParcel: false };
      parcels = Array.from({ length: 7 }, (_, i) => ({ x: 210 + i * 92, y: 90 + (i % 3) * 135, r: 10, taken: false }));
      drones = Array.from({ length: 5 }, (_, i) => ({ x: 260 + i * 120, y: 150 + (i % 2) * 170, vx: i % 2 ? -70 : 80, r: 18 }));
      score = 0; timeLeft = 45; last = performance.now(); over = false;
    }
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function update(dt) {
      if (over) return;
      let dx = (keys.has("ArrowRight") || keys.has("d") ? 1 : 0) - (keys.has("ArrowLeft") || keys.has("a") ? 1 : 0);
      let dy = (keys.has("ArrowDown") || keys.has("s") ? 1 : 0) - (keys.has("ArrowUp") || keys.has("w") ? 1 : 0);
      if (dx || dy) { const len = Math.hypot(dx, dy); dx /= len; dy /= len; }
      player.x = Math.max(18, Math.min(canvas.width - 18, player.x + dx * 210 * dt));
      player.y = Math.max(18, Math.min(canvas.height - 18, player.y + dy * 210 * dt));
      drones.forEach((d) => { d.x += d.vx * dt; if (d.x < 150 || d.x > canvas.width - 80) d.vx *= -1; if (dist(player, d) < player.r + d.r) { score = Math.max(0, score - 1); player.x = 90; player.y = 270; player.hasParcel = false; } });
      parcels.forEach((p) => { if (!p.taken && !player.hasParcel && dist(player, p) < player.r + p.r) { p.taken = true; player.hasParcel = true; } });
      if (player.hasParcel && player.x > canvas.width - 90 && player.y > 210 && player.y < 330) { score += 2; player.hasParcel = false; }
      timeLeft -= dt;
      if (timeLeft <= 0 || parcels.every((p) => p.taken) && !player.hasParcel) over = true;
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#132033"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#2dd4bf"; ctx.fillRect(canvas.width - 105, 210, 70, 120);
      ctx.fillStyle = "#9ddcff"; parcels.forEach((p) => { if (!p.taken) { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); } });
      ctx.fillStyle = "#f59e0b"; drones.forEach((d) => { ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2); ctx.fill(); });
      ctx.fillStyle = player.hasParcel ? "#9ddcff" : "#ffd166"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2); ctx.fill();
      if (over) { ctx.fillStyle = "rgba(0,0,0,.62)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#fff"; ctx.font = "48px sans-serif"; ctx.fillText("Run complete: " + score + " points", 260, 270); }
      scoreEl.textContent = String(score); timeEl.textContent = String(Math.max(0, Math.ceil(timeLeft)));
    }
    function frame(now) { const dt = Math.min(0.05, (now - last) / 1000); last = now; update(dt); draw(); requestAnimationFrame(frame); }
    addEventListener("keydown", (e) => keys.add(e.key));
    addEventListener("keyup", (e) => keys.delete(e.key));
    document.getElementById("restart").addEventListener("click", reset);
    reset(); requestAnimationFrame(frame);
  </script>
</body>
</html>
